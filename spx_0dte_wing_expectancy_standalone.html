<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SPX 0DTE Wing-Win Expectancy</title>
<style>
:root {
  color-scheme: light;
  --bg: #f6f8fb;
  --panel: #ffffff;
  --ink: #182230;
  --muted: #667085;
  --grid: #d0d5dd;
  --put: #2563eb;
  --call: #078667;
  --loss: #dc2626;
  --gain: #16a34a;
  --warn: #b45309;
  --soft: #eef2f6;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: var(--bg);
  color: var(--ink);
}
main {
  width: min(1240px, calc(100% - 32px));
  margin: 0 auto;
  padding: 28px 0 40px;
}
header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 18px;
}
h1 {
  margin: 0;
  font-size: 30px;
  line-height: 1.1;
  letter-spacing: 0;
}
.subtitle {
  margin-top: 8px;
  color: var(--muted);
  font-size: 14px;
}
.controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
button {
  border: 1px solid var(--grid);
  background: var(--panel);
  color: var(--ink);
  border-radius: 8px;
  padding: 9px 12px;
  font-weight: 700;
  cursor: pointer;
}
button.active {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}
.kpis {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.kpi {
  background: var(--panel);
  border: 1px solid #e4e7ec;
  border-radius: 8px;
  padding: 14px;
  min-height: 104px;
}
.kpi label {
  display: block;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}
.kpi strong {
  display: block;
  margin: 8px 0 5px;
  font-size: 24px;
  line-height: 1.05;
}
.kpi span {
  color: var(--muted);
  font-size: 13px;
}
.layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.panel {
  background: var(--panel);
  border: 1px solid #e4e7ec;
  border-radius: 8px;
  padding: 16px;
  overflow: hidden;
}
.panel.full { grid-column: 1 / -1; }
h2 {
  margin: 0 0 12px;
  font-size: 17px;
}
.heatmap-wrap {
  overflow-x: auto;
}
table {
  border-collapse: collapse;
  width: 100%;
  font-size: 13px;
}
th, td {
  border: 1px solid var(--grid);
  padding: 8px 10px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
th {
  background: var(--soft);
  color: var(--ink);
  font-weight: 700;
}
td {
  font-weight: 700;
}
.left { text-align: left; }
.chart {
  width: 100%;
  min-height: 310px;
}
.note {
  margin-top: 10px;
  color: var(--muted);
  font-size: 12px;
}
.rank-table tbody tr:first-child td {
  background: #ecfdf3;
}
.rank-table tbody tr:last-child td {
  background: #fff1f3;
}
@media (max-width: 940px) {
  header { align-items: flex-start; flex-direction: column; }
  .controls { justify-content: flex-start; }
  .kpis, .layout { grid-template-columns: 1fr; }
  .panel.full { grid-column: auto; }
}
</style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>SPX 0DTE Wing-Win Expectancy</h1>
      <div class="subtitle" id="meta"></div>
    </div>
    <nav class="controls" aria-label="Side filter">
      <button type="button" data-filter="All" class="active">All</button>
      <button type="button" data-filter="Puts">Puts</button>
      <button type="button" data-filter="Calls">Calls</button>
    </nav>
  </header>
  <section class="kpis" id="kpis"></section>
  <section class="layout">
    <article class="panel">
      <h2>Puts Heatmap</h2>
      <div class="heatmap-wrap" id="putsHeatmap"></div>
    </article>
    <article class="panel">
      <h2>Calls Heatmap</h2>
      <div class="heatmap-wrap" id="callsHeatmap"></div>
    </article>
    <article class="panel full">
      <h2>Best Expectancy by Wing Size</h2>
      <div class="chart" id="lineChart"></div>
    </article>
    <article class="panel">
      <h2>Average Expectancy by Credit</h2>
      <div class="chart" id="barChart"></div>
    </article>
    <article class="panel">
      <h2>Ranked Setups</h2>
      <div class="heatmap-wrap" id="ranked"></div>
      <div class="note">Sorted by expectancy. Use the side buttons above to focus the page.</div>
    </article>
  </section>
</main>
<script>
const DATA = {"meta":{"dateRange":"1/1/25 to 5/1/26","stopLoss":"2"},"sections":{"Puts":{"credits":[1.0,1.5,2.0,2.5,3.0],"matrix":[{"wing":10,"values":[0.01,-0.07,-0.11,-0.19,-0.42]},{"wing":15,"values":[0.03,0.0,-0.03,-0.1,-0.16]},{"wing":20,"values":[0.07,0.06,-0.03,0.03,-0.02]},{"wing":25,"values":[0.08,0.08,0.09,0.08,0.07]},{"wing":30,"values":[0.1,0.1,0.11,0.11,0.11]},{"wing":35,"values":[0.1,0.11,0.15,0.15,0.15]},{"wing":40,"values":[0.11,0.14,0.16,0.19,0.2]},{"wing":45,"values":[0.12,0.15,0.18,0.21,0.21]},{"wing":50,"values":[0.13,0.16,0.19,0.21,0.23]},{"wing":55,"values":[0.14,0.16,0.2,0.21,0.25]}]},"Calls":{"credits":[1.0,1.5,2.0,2.5,3.0],"matrix":[{"wing":10,"values":[-0.04,-0.13,-0.2,-0.29,-0.46]},{"wing":15,"values":[-0.02,-0.04,-0.08,-0.12,-0.17]},{"wing":20,"values":[0.0,0.02,0.0,-0.01,-0.07]},{"wing":25,"values":[0.04,0.06,0.06,0.05,0.01]},{"wing":30,"values":[0.06,0.08,0.11,0.11,0.1]},{"wing":35,"values":[0.07,0.12,0.12,0.16,0.16]},{"wing":40,"values":[0.08,0.12,0.15,0.17,0.2]},{"wing":45,"values":[0.09,0.13,0.17,0.2,0.24]},{"wing":50,"values":[0.11,0.15,0.18,0.21,0.25]},{"wing":55,"values":[0.11,0.16,0.21,0.23,0.26]}]}},"records":[{"side":"Puts","wing":10,"credit":1.0,"expectancy":0.01},{"side":"Puts","wing":10,"credit":1.5,"expectancy":-0.07},{"side":"Puts","wing":10,"credit":2.0,"expectancy":-0.11},{"side":"Puts","wing":10,"credit":2.5,"expectancy":-0.19},{"side":"Puts","wing":10,"credit":3.0,"expectancy":-0.42},{"side":"Puts","wing":15,"credit":1.0,"expectancy":0.03},{"side":"Puts","wing":15,"credit":1.5,"expectancy":0.0},{"side":"Puts","wing":15,"credit":2.0,"expectancy":-0.03},{"side":"Puts","wing":15,"credit":2.5,"expectancy":-0.1},{"side":"Puts","wing":15,"credit":3.0,"expectancy":-0.16},{"side":"Puts","wing":20,"credit":1.0,"expectancy":0.07},{"side":"Puts","wing":20,"credit":1.5,"expectancy":0.06},{"side":"Puts","wing":20,"credit":2.0,"expectancy":-0.03},{"side":"Puts","wing":20,"credit":2.5,"expectancy":0.03},{"side":"Puts","wing":20,"credit":3.0,"expectancy":-0.02},{"side":"Puts","wing":25,"credit":1.0,"expectancy":0.08},{"side":"Puts","wing":25,"credit":1.5,"expectancy":0.08},{"side":"Puts","wing":25,"credit":2.0,"expectancy":0.09},{"side":"Puts","wing":25,"credit":2.5,"expectancy":0.08},{"side":"Puts","wing":25,"credit":3.0,"expectancy":0.07},{"side":"Puts","wing":30,"credit":1.0,"expectancy":0.1},{"side":"Puts","wing":30,"credit":1.5,"expectancy":0.1},{"side":"Puts","wing":30,"credit":2.0,"expectancy":0.11},{"side":"Puts","wing":30,"credit":2.5,"expectancy":0.11},{"side":"Puts","wing":30,"credit":3.0,"expectancy":0.11},{"side":"Puts","wing":35,"credit":1.0,"expectancy":0.1},{"side":"Puts","wing":35,"credit":1.5,"expectancy":0.11},{"side":"Puts","wing":35,"credit":2.0,"expectancy":0.15},{"side":"Puts","wing":35,"credit":2.5,"expectancy":0.15},{"side":"Puts","wing":35,"credit":3.0,"expectancy":0.15},{"side":"Puts","wing":40,"credit":1.0,"expectancy":0.11},{"side":"Puts","wing":40,"credit":1.5,"expectancy":0.14},{"side":"Puts","wing":40,"credit":2.0,"expectancy":0.16},{"side":"Puts","wing":40,"credit":2.5,"expectancy":0.19},{"side":"Puts","wing":40,"credit":3.0,"expectancy":0.2},{"side":"Puts","wing":45,"credit":1.0,"expectancy":0.12},{"side":"Puts","wing":45,"credit":1.5,"expectancy":0.15},{"side":"Puts","wing":45,"credit":2.0,"expectancy":0.18},{"side":"Puts","wing":45,"credit":2.5,"expectancy":0.21},{"side":"Puts","wing":45,"credit":3.0,"expectancy":0.21},{"side":"Puts","wing":50,"credit":1.0,"expectancy":0.13},{"side":"Puts","wing":50,"credit":1.5,"expectancy":0.16},{"side":"Puts","wing":50,"credit":2.0,"expectancy":0.19},{"side":"Puts","wing":50,"credit":2.5,"expectancy":0.21},{"side":"Puts","wing":50,"credit":3.0,"expectancy":0.23},{"side":"Puts","wing":55,"credit":1.0,"expectancy":0.14},{"side":"Puts","wing":55,"credit":1.5,"expectancy":0.16},{"side":"Puts","wing":55,"credit":2.0,"expectancy":0.2},{"side":"Puts","wing":55,"credit":2.5,"expectancy":0.21},{"side":"Puts","wing":55,"credit":3.0,"expectancy":0.25},{"side":"Calls","wing":10,"credit":1.0,"expectancy":-0.04},{"side":"Calls","wing":10,"credit":1.5,"expectancy":-0.13},{"side":"Calls","wing":10,"credit":2.0,"expectancy":-0.2},{"side":"Calls","wing":10,"credit":2.5,"expectancy":-0.29},{"side":"Calls","wing":10,"credit":3.0,"expectancy":-0.46},{"side":"Calls","wing":15,"credit":1.0,"expectancy":-0.02},{"side":"Calls","wing":15,"credit":1.5,"expectancy":-0.04},{"side":"Calls","wing":15,"credit":2.0,"expectancy":-0.08},{"side":"Calls","wing":15,"credit":2.5,"expectancy":-0.12},{"side":"Calls","wing":15,"credit":3.0,"expectancy":-0.17},{"side":"Calls","wing":20,"credit":1.0,"expectancy":0.0},{"side":"Calls","wing":20,"credit":1.5,"expectancy":0.02},{"side":"Calls","wing":20,"credit":2.0,"expectancy":0.0},{"side":"Calls","wing":20,"credit":2.5,"expectancy":-0.01},{"side":"Calls","wing":20,"credit":3.0,"expectancy":-0.07},{"side":"Calls","wing":25,"credit":1.0,"expectancy":0.04},{"side":"Calls","wing":25,"credit":1.5,"expectancy":0.06},{"side":"Calls","wing":25,"credit":2.0,"expectancy":0.06},{"side":"Calls","wing":25,"credit":2.5,"expectancy":0.05},{"side":"Calls","wing":25,"credit":3.0,"expectancy":0.01},{"side":"Calls","wing":30,"credit":1.0,"expectancy":0.06},{"side":"Calls","wing":30,"credit":1.5,"expectancy":0.08},{"side":"Calls","wing":30,"credit":2.0,"expectancy":0.11},{"side":"Calls","wing":30,"credit":2.5,"expectancy":0.11},{"side":"Calls","wing":30,"credit":3.0,"expectancy":0.1},{"side":"Calls","wing":35,"credit":1.0,"expectancy":0.07},{"side":"Calls","wing":35,"credit":1.5,"expectancy":0.12},{"side":"Calls","wing":35,"credit":2.0,"expectancy":0.12},{"side":"Calls","wing":35,"credit":2.5,"expectancy":0.16},{"side":"Calls","wing":35,"credit":3.0,"expectancy":0.16},{"side":"Calls","wing":40,"credit":1.0,"expectancy":0.08},{"side":"Calls","wing":40,"credit":1.5,"expectancy":0.12},{"side":"Calls","wing":40,"credit":2.0,"expectancy":0.15},{"side":"Calls","wing":40,"credit":2.5,"expectancy":0.17},{"side":"Calls","wing":40,"credit":3.0,"expectancy":0.2},{"side":"Calls","wing":45,"credit":1.0,"expectancy":0.09},{"side":"Calls","wing":45,"credit":1.5,"expectancy":0.13},{"side":"Calls","wing":45,"credit":2.0,"expectancy":0.17},{"side":"Calls","wing":45,"credit":2.5,"expectancy":0.2},{"side":"Calls","wing":45,"credit":3.0,"expectancy":0.24},{"side":"Calls","wing":50,"credit":1.0,"expectancy":0.11},{"side":"Calls","wing":50,"credit":1.5,"expectancy":0.15},{"side":"Calls","wing":50,"credit":2.0,"expectancy":0.18},{"side":"Calls","wing":50,"credit":2.5,"expectancy":0.21},{"side":"Calls","wing":50,"credit":3.0,"expectancy":0.25},{"side":"Calls","wing":55,"credit":1.0,"expectancy":0.11},{"side":"Calls","wing":55,"credit":1.5,"expectancy":0.16},{"side":"Calls","wing":55,"credit":2.0,"expectancy":0.21},{"side":"Calls","wing":55,"credit":2.5,"expectancy":0.23},{"side":"Calls","wing":55,"credit":3.0,"expectancy":0.26}]};
let activeFilter = "All";

const currency = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2 });
const allValues = DATA.records.map(d => d.expectancy);
const globalMin = Math.min(...allValues);
const globalMax = Math.max(...allValues);

function filteredRecords() {
  return activeFilter === "All" ? DATA.records : DATA.records.filter(d => d.side === activeFilter);
}

function colorFor(value) {
  if (value < 0) {
    const t = Math.min(Math.abs(value / Math.min(globalMin, -0.01)), 1);
    return `rgb(254, ${Math.round(242 - 88 * t)}, ${Math.round(242 - 88 * t)})`;
  }
  const t = Math.min(value / Math.max(globalMax, 0.01), 1);
  return `rgb(${Math.round(240 - 116 * t)}, ${Math.round(253 - 52 * t)}, ${Math.round(244 - 94 * t)})`;
}

function bestByWing(side) {
  const section = DATA.sections[side];
  return section.matrix.map(row => {
    const candidates = row.values.map((value, i) => ({ credit: section.credits[i], expectancy: value }));
    candidates.sort((a, b) => b.expectancy - a.expectancy);
    return { wing: row.wing, ...candidates[0] };
  });
}

function avgByCredit(side) {
  const section = DATA.sections[side];
  return section.credits.map((credit, i) => {
    const values = section.matrix.map(row => row.values[i]);
    return { credit, expectancy: values.reduce((a, b) => a + b, 0) / values.length };
  });
}

function heatmap(side, targetId) {
  const section = DATA.sections[side];
  const rows = [`<table><thead><tr><th class="left">Wing / Credit</th>${section.credits.map(c => `<th>${c}</th>`).join("")}</tr></thead><tbody>`];
  for (const row of section.matrix) {
    rows.push(`<tr><th class="left">${row.wing}</th>`);
    row.values.forEach(value => rows.push(`<td style="background:${colorFor(value)}">${value.toFixed(2)}</td>`));
    rows.push("</tr>");
  }
  rows.push("</tbody></table>");
  document.getElementById(targetId).innerHTML = rows.join("");
}

function kpis() {
  const records = filteredRecords();
  const best = [...records].sort((a, b) => b.expectancy - a.expectancy)[0];
  const worst = [...records].sort((a, b) => a.expectancy - b.expectancy)[0];
  const avg = records.reduce((sum, d) => sum + d.expectancy, 0) / records.length;
  const positive = records.filter(d => d.expectancy > 0).length;
  const cards = [
    ["Best setup", currency.format(best.expectancy), `${best.side} W${best.wing} C${best.credit}`],
    ["Worst setup", currency.format(worst.expectancy), `${worst.side} W${worst.wing} C${worst.credit}`],
    ["Average expectancy", currency.format(avg), `${records.length} parameter cells`],
    ["Positive cells", `${positive} / ${records.length}`, `${Math.round(positive / records.length * 100)}% above zero`]
  ];
  document.getElementById("kpis").innerHTML = cards.map(([label, value, detail]) =>
    `<article class="kpi"><label>${label}</label><strong>${value}</strong><span>${detail}</span></article>`
  ).join("");
}

function svgLineChart() {
  const puts = bestByWing("Puts");
  const calls = bestByWing("Calls");
  const series = activeFilter === "Puts" ? [{name:"Puts", color:"#2563eb", rows:puts}] :
    activeFilter === "Calls" ? [{name:"Calls", color:"#078667", rows:calls}] :
    [{name:"Puts", color:"#2563eb", rows:puts}, {name:"Calls", color:"#078667", rows:calls}];
  const width = 1080, height = 330, l = 58, r = 24, t = 26, b = 42;
  const values = series.flatMap(s => s.rows.map(d => d.expectancy));
  const wings = puts.map(d => d.wing);
  const minY = Math.min(0, ...values), maxY = Math.max(...values);
  const minX = Math.min(...wings), maxX = Math.max(...wings);
  const x = wing => l + (wing - minX) / (maxX - minX) * (width - l - r);
  const y = value => t + (maxY - value) / (maxY - minY) * (height - t - b);
  const grid = [minY, 0, maxY].map(v => `<line x1="${l}" y1="${y(v)}" x2="${width-r}" y2="${y(v)}" stroke="#e4e7ec"/><text x="6" y="${y(v)+4}" font-size="12" fill="#667085">${currency.format(v)}</text>`).join("");
  const lines = series.map(s => `<polyline points="${s.rows.map(d => `${x(d.wing)},${y(d.expectancy)}`).join(" ")}" fill="none" stroke="${s.color}" stroke-width="3"/>`).join("");
  const dots = series.flatMap(s => s.rows.map(d => `<circle cx="${x(d.wing)}" cy="${y(d.expectancy)}" r="3.5" fill="${s.color}"><title>${s.name} wing ${d.wing}, credit ${d.credit}: ${currency.format(d.expectancy)}</title></circle>`)).join("");
  const legend = series.map((s, i) => `<circle cx="${width - 160 + i * 76}" cy="22" r="5" fill="${s.color}"/><text x="${width - 150 + i * 76}" y="26" font-size="13" fill="#182230">${s.name}</text>`).join("");
  document.getElementById("lineChart").innerHTML = `<svg viewBox="0 0 ${width} ${height}" width="100%" height="100%" role="img" aria-label="Best expectancy by wing size">${grid}${lines}${dots}${legend}<text x="${l}" y="${height-10}" font-size="12" fill="#667085">Wing size</text></svg>`;
}

function svgBarChart() {
  const sides = activeFilter === "All" ? ["Puts", "Calls"] : [activeFilter];
  const rows = sides.flatMap(side => avgByCredit(side).map(d => ({...d, side})));
  const width = 560, height = 310, l = 54, r = 18, t = 24, b = 44;
  const minY = Math.min(0, ...rows.map(d => d.expectancy));
  const maxY = Math.max(...rows.map(d => d.expectancy));
  const credits = DATA.sections.Puts.credits;
  const groupW = (width - l - r) / credits.length;
  const barW = groupW / (sides.length + 1);
  const y = value => t + (maxY - value) / (maxY - minY) * (height - t - b);
  const zero = y(0);
  const bars = rows.map(d => {
    const group = credits.indexOf(d.credit);
    const sideIdx = sides.indexOf(d.side);
    const x = l + group * groupW + (sideIdx + 0.5) * barW;
    const top = Math.min(y(d.expectancy), zero);
    const h = Math.max(Math.abs(zero - y(d.expectancy)), 1);
    const color = d.side === "Puts" ? "#2563eb" : "#078667";
    return `<rect x="${x}" y="${top}" width="${barW * 0.78}" height="${h}" fill="${color}"><title>${d.side} credit ${d.credit}: ${currency.format(d.expectancy)}</title></rect>`;
  }).join("");
  const labels = credits.map((c, i) => `<text x="${l + i * groupW + groupW / 2}" y="${height-14}" text-anchor="middle" font-size="12" fill="#667085">${c}</text>`).join("");
  document.getElementById("barChart").innerHTML = `<svg viewBox="0 0 ${width} ${height}" width="100%" height="100%" role="img" aria-label="Average expectancy by credit"><line x1="${l}" y1="${zero}" x2="${width-r}" y2="${zero}" stroke="#98a2b3" stroke-dasharray="4 4"/>${bars}${labels}<text x="6" y="${y(maxY)+4}" font-size="12" fill="#667085">${currency.format(maxY)}</text><text x="6" y="${y(minY)+4}" font-size="12" fill="#667085">${currency.format(minY)}</text><text x="${l}" y="16" font-size="12" fill="#667085">Credit</text></svg>`;
}

function ranked() {
  const rows = [...filteredRecords()].sort((a, b) => b.expectancy - a.expectancy);
  const visible = rows.slice(0, 8).concat(rows.slice(-4));
  document.getElementById("ranked").innerHTML = `<table class="rank-table"><thead><tr><th class="left">Side</th><th>Wing</th><th>Credit</th><th>Expectancy</th></tr></thead><tbody>${
    visible.map(d => `<tr><td class="left">${d.side}</td><td>${d.wing}</td><td>${d.credit}</td><td style="background:${colorFor(d.expectancy)}">${currency.format(d.expectancy)}</td></tr>`).join("")
  }</tbody></table>`;
}

function render() {
  document.getElementById("meta").textContent = `Backtest range: ${DATA.meta.dateRange} | Stop loss: ${DATA.meta.stopLoss} | Expectancy shown in dollars`;
  heatmap("Puts", "putsHeatmap");
  heatmap("Calls", "callsHeatmap");
  kpis();
  svgLineChart();
  svgBarChart();
  ranked();
}

document.querySelectorAll("button[data-filter]").forEach(button => {
  button.addEventListener("click", () => {
    activeFilter = button.dataset.filter;
    document.querySelectorAll("button[data-filter]").forEach(b => b.classList.toggle("active", b === button));
    render();
  });
});

render();
</script>
</body>
</html>
